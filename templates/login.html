{% extends "base.html" %}
{% block title %}Entrar{% endblock %}
{% block content %}
<div class="auth-box">
  <h1>Entrar</h1>
  {% if erro %}<p class="alert alert-error">{{ erro }}</p>{% endif %}
  {% if msg %}<p class="alert alert-ok">{{ msg }}</p>{% endif %}
  <form method="post" action="/login">
    <label>E-mail</label>
    <input type="email" name="email" required autofocus>
    <label>Senha</label>
    <input type="password" name="password" required>
    <button type="submit" class="btn-primary">Entrar</button>
  </form>
  <p class="muted">Não tem conta? <a href="/cadastro">Cadastre-se</a></p>
</div>
{% endblock %}
