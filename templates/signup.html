{% extends "base.html" %}
{% block title %}Cadastro{% endblock %}
{% block content %}
<div class="auth-box">
  <h1>Criar conta</h1>
  {% if erro %}<p class="alert alert-error">{{ erro }}</p>{% endif %}
  {% if msg %}<p class="alert alert-ok">{{ msg }}</p>{% endif %}
  <form method="post" action="/cadastro">
    <label>Nome</label>
    <input type="text" name="name" required autofocus>
    <label>E-mail</label>
    <input type="email" name="email" required>
    <label>Senha (mínimo 6 caracteres)</label>
    <input type="password" name="password" required minlength="6">
    <button type="submit" class="btn-primary">Cadastrar</button>
  </form>
  <p class="muted">Você receberá um e-mail para confirmar o cadastro antes de poder entrar.</p>
  <p class="muted">Já tem conta? <a href="/login">Entrar</a></p>
</div>
{% endblock %}
